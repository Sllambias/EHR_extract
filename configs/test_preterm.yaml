defaults:
  - default@
  - _self_

paths:
  input_dir_SDS: ehr2meds/data/raw/fetal_data/SDS_and_SP_from_population
  input_dir_SP: ehr2meds/data/raw/fetal_data/SDS_and_SP_from_population
  output_dir: /Users/zcr545/Desktop/Projects/repos/EHR_extract/outputs/${hydra:job.config_name}
  population_save_path: ${paths.output_dir}/${hydra:job.config_name}_population
  discards_save_path: ${paths.output_dir}/${hydra:job.config_name}_discards
  distribution_save_path: ${paths.output_dir}/${hydra:job.config_name}_distribution
  holdout_csv: 
  
strict: True 
prefix: /projects/users/data/UCPH/DeepFetal/ultrasound/PNG_processed_no_OCR/ # this should be deleted when splits are updated to include child CPR so we can match on that

population: 
  population_key: CPR_BARN
  tables: 
    - table: ${paths.input_dir_SDS}/mfr.csv
      columns:
        CPR_BARN: CPR_BARN
        CPR_MOR: CPR_MODER
        GA: GESTATIONSALDER_DAGE
        Birthday: FOEDSELSDATO
    - table: ${paths.input_dir_SDS}/nyfoedte.csv
      columns:
        CPR_BARN: CPRnummer_Barn
        CPR_MOR: CPRnummer_Mor
        GA: Gestationsalder
        Birthday: FoedselsDato_Barn

imaging_table:
  table: /Users/zcr545/Desktop/Projects/repos/EHR_extract/test_data/test_table.csv
  population_key: cpr_child
  file_path_key: file_path

conditional_criteria:
  - action: include
    conditions:
      - condition:
        table: ${paths.input_dir_SP}/population.csv
        match_on: CPR_BARN
  # GA available at birth
  - action: include
    conditions: 
      - condition: 
        table: ${paths.input_dir_SDS}/mfr.csv
        match_on: CPR_BARN
        column: GESTATIONSALDER_DAGE
        operator: ">"
        value: 0
      - condition: or
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Gestationsalder
        operator: ">"
        value: 0
  # Only live birth
  - action: include
    conditions:
      - condition: 
        table: ${paths.input_dir_SDS}/mfr.csv
        match_on: CPR_BARN
        column: LEVENDE_ELLER_DOEDFOEDT
        operator: "=="
        value: Levendefødt
      - condition: or
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: LevendefoedtDoedfoedt
        operator: "=="
        value: "1"
  # Not C-section (kejsersnit)
  - action: include
    conditions:
      - condition:
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Kejsersnit
        operator: "=="
        value: "-1"
      - condition: or
        table: ${paths.input_dir_SDS}/mfr.csv
        match_on: CPR_BARN
        column: MARKOER_KEJSERSNIT
        operator: "!="
        value: "1"
  # Not induced
  - action: exclude
    conditions:
      - condition:
        table: ${paths.input_dir_SDS}/mfr.csv
        match_on: CPR_BARN
        column: MARKOER_IGANGSAETTELSE
        operator: "=="
        value: "1"
      - condition: or
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Igangsaettelse_Ballonkateter
        operator: "=="
        value: "Ja"
      - condition: or
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Igangsaettelse_Medicinsk
        operator: "=="
        value: "Ja"
      - condition: or
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Igangsaettelse_HSP
        operator: "=="
        value: "Ja"

custom_criteria:
  # Removes twin pregnancies AND close pregnancies
  - function: find_close_births
    args:
      table: ${paths.input_dir_SDS}/nyfoedte.csv
      match_on: CPRnummer_Barn
      mom_column: CPRnummer_Mor
      birth_id_column: DW_EK_Foedsel
      delivery_date_column: FoedselsDato_Barn
      threshold_days: 280
    action: exclude
  - function: find_close_births
    args:
      table: ${paths.input_dir_SDS}/mfr.csv
      match_on: CPR_BARN
      mom_column: CPR_MODER
      birth_id_column: FOEDSELSLOEBENUMMER
      delivery_date_column: FOEDSELSDATO
      threshold_days: 280
    action: exclude
imaging_matching_criteria:
  # Filter1: Scan-to-delivery interval
  # Filter2: GA at scan
  - function: find_images_and_timedeltas
    args: 
      scan_date_column: study_date
      image_path_column: file_path
      population_ga_in_days_at_delivery_column: GA
      population_delivery_date_column: Birthday
      min_diff_days_scan_to_delivery: 0 #0
      max_diff_days_scan_to_delivery: 99999 #210
      min_ga_in_days_at_scan: -99999 #196
      max_ga_in_days_at_scan: 99999 #259
    action: include
  # Only Cervix
  - function: find_images_with_predicted_classes
    # requires that "find_images_and_timedeltas" is run first to generate imaging metadata dataframe
    args:
      table: /Users/zcr545/Desktop/Projects/repos/EHR_extract/test_data/img_type.csv
      classes: [14]
      image_path_column: filename
      class_column: pred
      population_image_path_column: ${imaging_table.file_path_key} 
    action: include
    

