paths:
  input_dir: ehr2meds/data/raw/fetal_data/SDS_and_SP_from_population
  output_dir: /Users/zcr545/Desktop/Projects/repos/EHR_extract/outputs 
  population_save_path: ${paths.output_dir}/population_${hydra:job.config_name}.json
  discards_save_path: ${paths.output_dir}/discards_${hydra:job.config_name}.json
  distribution_save_path: ${paths.output_dir}/distribution_${hydra:job.config_name}.json
  imaging_metadata_save_path: ${paths.output_dir}/imaging_metadata_${hydra:job.config_name}.csv

strict: True 

base_population: 
  table: ${paths.input_dir}/population.csv
  column: CPR_BARN

conditional_criteria:
  # GA available at birth
  - action: include
    conditions: 
      - condition: 
        table: ${paths.input_dir}/mfr.csv
        match_on: CPR_BARN
        column: GESTATIONSALDER_DAGE
        operator: ">"
        value: 0
      - condition: and
        table: ${paths.input_dir}/mfr.csv
        match_on: CPR_BARN
        column: LEVENDE_ELLER_DOD
        operator: "!="
        value: Levende
        action: exclude
      - condition: or
        table: ${paths.input_dir}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Gestationsalder
        operator: ">"
        value: 0
  # Not C-section (kejsersnit)
  - action: include
    conditions:
      - condition:
        table: ${paths.input_dir}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Kejsersnit
        operator: "=="
        value: "-1"
      - condition: or
        table: ${paths.input_dir}/mfr.csv
        match_on: CPR_BARN
        column: MARKOER_KEJSERSNIT
        operator: "!="
        value: "1"
  # Not induced
  - action: exclude
    conditions:
      - condition:
        table: ${paths.input_dir}/mfr.csv
        match_on: CPR_BARN
        column: MARKOER_IGANGSAETTELSE
        operator: 
        value: 
      - condition: or
        table: ${paths.input_dir}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Igangsaettelse_Ballonkateter
        operator: 
        value:
      - condition: or
        table: ${paths.input_dir}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Igangsaettelse_Medicinsk
        operator: 
        value:
      - condition: or
        table: ${paths.input_dir}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Igangsaettelse_HSP
        operator: 
        value:

custom_criteria:
  # Removes twin pregnancies AND close pregnancies
  - function: find_close_siblings
    args:
      table: ${paths.input_dir}/mfr.csv
      match_on: CPR_BARN
      mom_column: CPR_MODER
      delivery_date_column: FOEDSELSDATO
      threshold_days: 280
    action: exclude
    
